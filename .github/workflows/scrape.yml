name: Täglicher Wohnungs-Scraper

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Abhängigkeiten installieren
        working-directory: scraper
        run: npm install

      - name: Playwright Chromium installieren
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Scraper ausführen
        working-directory: scraper
        run: node scraper.js

      - name: Ergebnisse als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: listings-${{ github.run_id }}
          path: scraper/results/
          if-no-files-found: warn

      - name: Ergebnisse ins Repository committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p scraper/results
          git add scraper/results/ || true
          git diff --staged --quiet || git commit -m "auto: Listings aktualisiert $(date +'%Y-%m-%d')"
          git push
        continue-on-error: true
